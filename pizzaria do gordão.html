<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pizzaria do Gordão - Pedidos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        h1, h2 { color: #e74c3c; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .item-card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; }
        select { margin: 5px 0; padding: 5px; width: 100%; }
        button { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; width: 100%; }
        #carrinho { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 15px; border-radius: 10px; max-height: 500px; overflow-y: auto; width: 300px; }
        .depoimentos { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Pizzaria do Gordão</h1>
    <h2>Pizzas Salgadas</h2><div id="menu-pizzas" class="menu-grid"></div>
    <h2>Pizzas Doces</h2><div id="menu-doces" class="menu-grid"></div>
    <h2>Cervejas</h2><div id="menu-cervejas" class="menu-grid"></div>
    
    <div class="depoimentos">
        <h3>Avaliações dos Clientes</h3>
        <p>"A melhor pizza da região, entrega muito rápida!" - <em>João Silva</em></p>
        <p>"O recheio é muito farto, recomendo a de Strogonoff!" - <em>Maria Souza</em></p>
    </div>
</div>

<div id="carrinho">
    <strong>Seu Pedido:</strong>
    <ul id="lista-pedidos"></ul>
    <p>Taxa de Entrega: R$ 5.00</p>
    <strong>Total: R$ <span id="total">5.00</span></strong>
    <hr>
    <label>Pagamento:</label>
    <select id="pagamento">
        <option value="pix">Pix</option>
        <option value="credito">Cartão de Crédito</option>
        <option value="debito">Cartão de Débito</option>
        <option value="dinheiro">Dinheiro</option>
    </select>
</div>

<script>
    const cardapio = {
        pizzas: ["Margherita", "Calabresa", "Portuguesa", "Quatro Queijos", "Frango c/ Catupiry", "Pepperoni", "Bacon", "Strogonoff", "Caprese", "Moda da Casa"],
        doces: ["Chocolate", "Banana c/ Canela", "Brigadeiro", "Romeu e Julieta", "Prestígio"],
        cervejas: ["Heineken", "Budweiser", "Stella Artois", "Corona", "Brahma", "Skol", "Antarctica", "Eisenbahn", "Colorado", "Patagonia"],
    };

    let carrinho = [];
    let total = 5.00; // Taxa de entrega fixa

    function renderizar(lista, containerId, precoBase, tipo) {
        const container = document.getElementById(containerId);
        lista.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            let html = `<h4>${item}</h4>`;
            
            if (tipo === 'pizza') {
                html += `<select id="tam-${item.replace(/\s/g, '')}">
                            <option value="40">Pequena (R$ 40)</option>
                            <option value="50" selected>Média (R$ 50)</option>
                            <option value="60">Grande (R$ 60)</option>
                         </select>
                         <button onclick="adicionar('${item}', document.getElementById('tam-${item.replace(/\s/g, '')}').value)">Adicionar</button>`;
            } else {
                html += `<p>R$ ${precoBase.toFixed(2)}</p><button onclick="adicionar('${item}', ${precoBase})">Adicionar</button>`;
            }
            div.innerHTML = html;
            container.appendChild(div);
        });
    }

    function adicionar(nome, preco) {
        preco = parseFloat(preco);
        carrinho.push({nome, preco});
        total += preco;
        atualizarCarrinho();
    }

    function atualizarCarrinho() {
        const lista = document.getElementById('lista-pedidos');
        lista.innerHTML = '';
        carrinho.forEach((item, index) => {
            lista.innerHTML += `<li>${item.nome} (R$ ${item.preco.toFixed(2)})</li>`;
        });
        document.getElementById('total').innerText = total.toFixed(2);
    }

    renderizar(cardapio.pizzas, 'menu-pizzas', 50, 'pizza');
    renderizar(cardapio.doces, 'menu-doces', 50, 'pizza');
    renderizar(cardapio.cervejas, 'menu-cervejas', 12, 'extra');
</script>

</body>
</html>
